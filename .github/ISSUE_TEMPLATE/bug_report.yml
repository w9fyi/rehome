name: Bug report
description: Report a problem with rehome
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying rehome! It's pre-alpha, so bug reports are extra valuable. Fill in what you can.

  - type: dropdown
    id: severity
    attributes:
      label: How bad is this problem?
      options:
        - "Critical — Lost network config or broke my live network"
        - "Severe — Migration failed completely, no workaround"
        - "High — Partial migration failure"
        - "Medium — Wrong value produced but caught in review"
        - "Low — Cosmetic / suggestion"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: input
    id: source_vendor
    attributes:
      label: Source router (what you're migrating FROM)
      placeholder: "e.g. Asus RT-BE82U, firmware 3.0.0.6"
    validations:
      required: true

  - type: input
    id: dest_vendor
    attributes:
      label: Destination router (what you're migrating TO)
      placeholder: "e.g. Ubiquiti UniFi Dream Router 7, UniFi OS 4.2"
    validations:
      required: true

  - type: input
    id: rehome_version
    attributes:
      label: rehome version or commit
      description: "Run `rehome --version` or paste the git commit hash you built from"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system you ran rehome on
      placeholder: "macOS 26.1 / Ubuntu 24.04 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      value: |
        ```
        rehome ...
        ```
    validations:
      required: false

  - type: textarea
    id: output
    attributes:
      label: Full terminal output (redact any passwords/keys!)
      value: |
        ```
        paste output here
        ```
    validations:
      required: false

  - type: textarea
    id: yaml
    attributes:
      label: Your rehome YAML config (redact secrets!)
      value: |
        ```yaml
        paste yaml here
        ```
    validations:
      required: false
